name: Performance Monthly Review

# v5.1：每月 1 號 09:00 (Asia/Taipei = UTC 01:00) 自動產生 monthly-review-YYYY-MM.md
# 主管在該檔上打勾即視為確認，不需逐件留言
# 對應提案「主管一鍵審核」設計

on:
  schedule:
    - cron: '0 1 1 * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pyyaml

      - name: Generate monthly review
        env:
          GH_TOKEN: ${{ secrets.PERF_TOKEN }}
        run: |
          MONTH=$(date -u -d "1 day ago" +%Y-%m)  # 上個月（每月 1 號跑時取上個月）
          YEAR=$(echo "$MONTH" | cut -d- -f1)
          MM=$(echo "$MONTH" | cut -d- -f2)

          OUTPUT="performance/monthly-review-$MONTH.md"
          mkdir -p performance

          cat > "$OUTPUT" <<HEADER
> 月度 Review · $MONTH
> 自動產出時間：$(date -u +%Y-%m-%dT%H:%MZ)
> 主管請逐項打勾（\`- [ ]\` → \`- [x]\`），打勾即視為確認

---

## 軸 1：AI 導入

### \`perf:ai-contribution\` 自報待確認

(自動掃當月該 label issue 並列出，這裡待 generate-dashboard-data.py 整合輸出)

### \`perf:ai-zero\` 警示（不扣分，列入觀察）

(連續 ≥ 2 個月觸發者建議 1-on-1)

---

## 軸 2：如期交付

### \`perf:milestone-missed\` 件數
### \`perf:review-lag\` 件數（含當月上限 -5）

---

## 軸 3：品質

### \`perf:quality-rollback\` 件數（含申訴轉移）
### \`perf:customer-bug\` 件數
### \`perf:hidden-bug\` 件數

---

## 主管確認

- [ ] PM 主管 review 完畢
- [ ] RD 主管 review 完畢
- [ ] BU Head 看過

> Generated by perf-monthly-review.yml v5.1。詳細實作將於下版補完。
HEADER

          # 提交回 .github repo
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add "$OUTPUT"
          if git diff --cached --quiet; then
            echo "no changes"
          else
            git commit -m "perf: 月報 $MONTH 自動產出"
            git push
          fi
