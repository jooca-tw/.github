name: Performance Dashboard

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
  issues:
    types: [labeled, unlabeled, closed, reopened]

permissions:
  contents: write
  issues: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pyyaml

      - name: Generate dashboard data
        env:
          GH_TOKEN: ${{ secrets.PERF_TOKEN }}
        run: python performance/scripts/generate-dashboard-data.py

      - name: Prepare publish directory
        run: |
          mkdir -p performance/publish/data
          cp performance/dashboard-out/data.json performance/publish/data/
          cp performance/dashboard/*.html performance/publish/
          cp performance/dashboard/*.css performance/publish/
          cp performance/dashboard/*.js performance/publish/

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./performance/publish
